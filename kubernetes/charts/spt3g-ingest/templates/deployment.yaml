---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: celery-worker
  {{- with .Values.common.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.celery.workers.replicas }}
  serviceName: celery-worker
  selector:
    matchLabels:
      app.kubernetes.io/name: celery-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: ingester
        app.kubernetes.io/name: celery-worker
        app.kubernetes.io/component: celery-worker
    spec:
      containers:
      - name: celery
        image: {{ .Values.image.url }}
        imagePullPolicy: {{ .Values.image.imagePullPolicy }}
        command:
        - bash
        - entrypoints/run_celery_worker.sh
        - alerts
        env:
          {{- include "ingester.env" . | nindent 10 }}
        # References for probes:
        #   - https://github.com/celery/celery/issues/4079
        #   - https://medium.com/ambient-innovation/health-checks-for-celery-in-kubernetes-cf3274a3e106
        livenessProbe:
          exec:
            command:
            - sh
            - -c
            - test $(($(date +%s) - $(stat -c %Y /tmp/worker_heartbeat))) -lt 10
          initialDelaySeconds: 10
          periodSeconds: 5
        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - test -e /tmp/worker_ready
          initialDelaySeconds: 10
          periodSeconds: 5
        {{- with  .Values.celery.workers.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 10Gi
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - celery-worker
              topologyKey: "kubernetes.io/hostname"
